<!-- Used Claude to help generate -->
<nav class="navbar">
  <a class="navbar__logo" routerLink="/">Jarren Bess</a>
  <ul class="navbar__links">
    <li>
      <a class="navbar__link" routerLink="/" routerLinkActive="navbar__link--active"
         [routerLinkActiveOptions]="{ exact: true }">Home</a>
    </li>
    <li>
      <a class="navbar__link" routerLink="/about" routerLinkActive="navbar__link--active">About</a>
    </li>
    <li>
      <a class="navbar__link" routerLink="/resume" routerLinkActive="navbar__link--active">Resume</a>
    </li>
    <li>
      <a class="navbar__link" routerLink="/projects" routerLinkActive="navbar__link--active">Projects</a>
    </li>
  </ul>
  <button
    class="navbar__theme-toggle"
    data-testid="theme-toggle"
    (click)="toggleTheme()"
    [class.is-animating]="isAnimating"
    (animationend)="clearAnimation()"
    [attr.aria-label]="isDarkMode ? 'Switch to light mode' : 'Switch to dark mode'"
  >
    @if (isDarkMode) {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/>
        <line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/>
        <line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
    } @else {
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    }
  </button>
</nav>

<main class="main-content">
  <router-outlet />
</main>

  <div class="footer__inner">
    <nav class="footer__nav">
      <a class="footer__nav-link" routerLink="/">Home</a>
      <span class="footer__separator">·</span>
      <a class="footer__nav-link" routerLink="/about">About</a>
      <span class="footer__separator">·</span>
      <a class="footer__nav-link" routerLink="/resume">Resume</a>
      <span class="footer__separator">·</span>
      <a class="footer__nav-link" routerLink="/projects">Projects</a>
    </nav>
    <p class="footer__copyright">
      © 2026 Jarren Bess
      <span class="footer__separator">·</span>
      <a class="footer__social-link" data-testid="footer-github"
         href="https://github.com/jarrenbess" target="_blank" rel="noopener noreferrer">GitHub</a>
      <span class="footer__separator">·</span>
      <a class="footer__social-link" data-testid="footer-linkedin"
         href="https://linkedin.com/in/jarrenbess" target="_blank" rel="noopener noreferrer">LinkedIn</a>
      <span class="footer__separator">·</span>
      <a class="footer__social-link" data-testid="footer-email"
         href="mailto:bessjarren@yahoo.com">Email</a>
    </p>
  </div>
</footer>
