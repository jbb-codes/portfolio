<a class="skip-link" href="#main-content" (click)="skipToMain($event)"
  >Skip to main content</a
>
@if (isBrowser) {
  <app-custom-cursor />
  <app-orb-background />
  <app-particle-background />
}
@if (showNavbar()) {
  <header>
    <app-navbar />
  </header>
}

<main id="main-content" tabindex="-1" class="main-content">
  <div
    class="route-animation-wrapper"
    data-testid="route-animation-wrapper"
    [@routeFadeAnimation]="outlet.isActivated ? outlet.activatedRoute : ''"
  >
    <router-outlet #outlet="outlet" />
  </div>
</main>

<footer class="footer">
  <div class="footer__inner">
    <nav class="footer__nav" aria-label="Footer navigation">
      <a class="footer__nav-link" data-testid="footer-nav-link" routerLink="/"
        >Home</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__nav-link"
        data-testid="footer-nav-link"
        routerLink="/about"
        >About</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__nav-link"
        data-testid="footer-nav-link"
        routerLink="/resume"
        >Resume</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__nav-link"
        data-testid="footer-nav-link"
        routerLink="/projects"
        >Projects</a
      >
    </nav>
    <p class="footer__copyright" data-testid="footer-copyright">
      © 2026 Jarren Bess
      <span class="footer__separator">·</span>
      <a
        class="footer__social-link"
        data-testid="footer-github"
        href="https://github.com/jbb-codes"
        target="_blank"
        rel="noopener noreferrer"
        >GitHub</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__social-link"
        data-testid="footer-linkedin"
        href="https://linkedin.com/in/jarrenbess"
        target="_blank"
        rel="noopener noreferrer"
        >LinkedIn</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__social-link"
        data-testid="footer-email"
        href="mailto:bessjarren@yahoo.com"
        >Email</a
      >
    </p>
  </div>
</footer>
