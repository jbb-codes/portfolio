<app-custom-cursor />
<app-orb-background />
<app-particle-background data-testid="particle-background" />
@if (showNavbar()) {
  <app-navbar />
}

<main class="main-content">
  <div
    class="route-animation-wrapper"
    data-testid="route-animation-wrapper"
    [@routeFadeAnimation]="outlet.isActivated ? outlet.activatedRoute : ''"
  >
    <router-outlet #outlet="outlet" />
  </div>
</main>

<footer class="footer">
  <div class="footer__inner">
    <nav class="footer__nav">
      <a class="footer__nav-link" data-testid="footer-nav-link" routerLink="/"
        >Home</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__nav-link"
        data-testid="footer-nav-link"
        routerLink="/about"
        >About</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__nav-link"
        data-testid="footer-nav-link"
        routerLink="/resume"
        >Resume</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__nav-link"
        data-testid="footer-nav-link"
        routerLink="/projects"
        >Projects</a
      >
    </nav>
    <p class="footer__copyright" data-testid="footer-copyright">
      © 2026 Jarren Bess
      <span class="footer__separator">·</span>
      <a
        class="footer__social-link"
        data-testid="footer-github"
        href="https://github.com/jarrenbess"
        target="_blank"
        rel="noopener noreferrer"
        >GitHub</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__social-link"
        data-testid="footer-linkedin"
        href="https://linkedin.com/in/jarrenbess"
        target="_blank"
        rel="noopener noreferrer"
        >LinkedIn</a
      >
      <span class="footer__separator">·</span>
      <a
        class="footer__social-link"
        data-testid="footer-email"
        href="mailto:bessjarren@yahoo.com"
        >Email</a
      >
    </p>
  </div>
</footer>
