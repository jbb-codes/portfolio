<div class="timeline">
  @for (entry of entries; track entry.title) {
    <div
      class="timeline__entry timeline__entry--{{ entry.type }}"
      data-testid="timeline-entry"
    >
      <div class="timeline__marker"></div>
      <div class="timeline__content">
        <span class="timeline__date">{{ entry.date }}</span>
        <h3 class="timeline__title">{{ entry.title }}</h3>
        <span class="timeline__organization">{{ entry.organization }}</span>
        <p class="timeline__description">{{ entry.description }}</p>
      </div>
    </div>
  }
</div>
