<section class="projects" aria-labelledby="projects-heading">
  <h1
    id="projects-heading"
    class="projects__heading"
    data-testid="projects-heading"
  >
    My Projects
  </h1>

  @for (project of projects; track project.number) {
    <article
      class="projects__card glass"
      data-testid="project-card"
      data-cursor-hover
    >
      <picture>
        <source [srcset]="toWebpUrl(project.screenshotUrl)" type="image/webp" />
        <img
          class="projects__screenshot"
          [src]="project.screenshotUrl"
          [alt]="project.name"
        />
      </picture>

      <div class="projects__details">
        <h2 class="projects__name">{{ project.name }}</h2>
        <a
          class="projects__github-link"
          data-testid="project-github-link"
          [href]="project.githubUrl"
          target="_blank"
          rel="noopener noreferrer"
          >GitHub</a
        >
        <p class="projects__description">{{ project.description }}</p>

        <ul class="projects__tech-list" data-testid="project-tech-list">
          @for (tech of project.technologies; track tech) {
            <li class="projects__tech-tag">{{ tech }}</li>
          }
        </ul>

        <p class="projects__what-learned">{{ project.whatILearned }}</p>
      </div>
    </article>
  }
</section>
<!-- === End: generated by Claude === -->
